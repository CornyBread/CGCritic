<ion-header class="ion-no-border">
  <ion-toolbar class="home-toolbar">
    <ion-buttons slot="start">
      <button class="avatar-btn" type="button" (click)="openProfile()" aria-label="Perfil">
        <span class="avatar">{{ initials }}</span>
      </button>
    </ion-buttons>
    <ion-title>CGCritic</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="home-content">
  <div class="home-empty">
    <div class="home-mark">CG</div>
    <h2>Home</h2>
    <p>Nothing here yet — this is where the magic will happen.</p>
  </div>
</ion-content>

<ion-modal class="profile-modal" [isOpen]="profileOpen" (didDismiss)="closeProfile()">
  <ng-template>
    <app-profile-menu (close)="closeProfile()"></app-profile-menu>
  </ng-template>
</ion-modal>
