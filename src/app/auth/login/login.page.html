<ion-content [fullscreen]="true" class="auth-content">
  <div class="auth-backdrop">
    <div class="geass-glow"></div>
    <div class="geass-sigil"></div>
  </div>

  <div class="auth-wrapper">
    <div class="brand">
      <div class="brand-mark">CG</div>
      <div class="brand-text">
        <h1>CGCritic</h1>
        <p>Pierce the truth of every story</p>
      </div>
    </div>

    <div class="auth-card">
      <h2 class="auth-title">Sign In</h2>
      <p class="auth-subtitle">Welcome back, accept your power.</p>

      <form (ngSubmit)="onSubmit()">
        <div class="field" [class.field-error]="!!error">
          <ion-icon name="mail-outline" class="field-icon"></ion-icon>
          <ion-input
            type="text"
            label="Email or username"
            labelPlacement="floating"
            fill="solid"
            autocomplete="username"
            [(ngModel)]="email"
            name="email"
          ></ion-input>
        </div>

        <div class="field" [class.field-error]="!!error">
          <ion-icon name="lock-closed-outline" class="field-icon"></ion-icon>
          <ion-input
            [type]="showPassword ? 'text' : 'password'"
            label="Password"
            labelPlacement="floating"
            fill="solid"
            autocomplete="current-password"
            [(ngModel)]="password"
            name="password"
          ></ion-input>
          <button type="button" class="reveal" (click)="togglePassword()">
            <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </button>
        </div>

        @if (error) {
          <p class="error-text">{{ error }}</p>
        }

        <ion-button
          type="submit"
          expand="block"
          class="submit-btn"
          [disabled]="loading"
        >
          @if (loading) {
            <ion-spinner name="crescent"></ion-spinner>
          } @else {
            Sign In
          }
        </ion-button>
      </form>

      <div class="divider"><span>OR</span></div>

      <app-social-auth
        [loadingProvider]="loadingProvider"
        [disabled]="loading"
        (auth)="onSocial($event)"
      ></app-social-auth>

      <p class="switch-text">
        Don't have an account?
        <button type="button" (click)="goToRegister()">Sign Up</button>
      </p>
    </div>
  </div>
</ion-content>
